<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Stats PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e11; --card-bg: #1e2329; --accent: #f0b90b; --text: #eaecef; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; user-select: none; }
        .stats-box { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .win-pct { font-size: 38px; font-weight: bold; color: #02c076; }
        .hand-name { font-size: 14px; color: var(--accent); text-transform: uppercase; margin-top: 5px; }
        
        .section-label { font-size: 10px; color: #848e9c; margin-bottom: 5px; text-align: left; padding-left: 5px; }
        .board-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .row { display: flex; gap: 6px; justify-content: center; }
        
        .card-slot { background: #2b3139; border: 1px solid #474d57; height: 65px; width: 45px; border-radius: 6px; 
                     display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .card-slot.active { border: 2px solid var(--accent); background: #363d48; }
        .card-slot.filled { background: #fff; color: #000; border: none; }
        
        .selector-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 10px; }
        .sel-btn { background: #2b3139; border: none; color: #fff; padding: 10px 0; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .suit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .suit-btn { padding: 15px; font-size: 20px; border-radius: 8px; border: none; color: #fff; background: #2b3139; }
        
        .footer-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; }
        .reset { background: #333; color: #fff; }
        .players { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div class="stats-box">
    <div id="win-output" class="win-pct">0%</div>
    <div id="hand-output" class="hand-name">Ожидание карт...</div>
</div>

<div class="board-container">
    <div class="section-label">ВАШИ КАРТЫ</div>
    <div class="row">
        <div class="card-slot active" id="slot-0" onclick="setSlot(0)">?</div>
        <div class="card-slot" id="slot-1" onclick="setSlot(1)">?</div>
    </div>
    
    <div class="section-label">СТОЛ (ФЛОП, ТЕРН, РИВЕР)</div>
    <div class="row">
        <div class="card-slot" id="slot-2" onclick="setSlot(2)">?</div>
        <div class="card-slot" id="slot-3" onclick="setSlot(3)">?</div>
        <div class="card-slot" id="slot-4" onclick="setSlot(4)">?</div>
        <div style="width: 10px;"></div>
        <div class="card-slot" id="slot-5" onclick="setSlot(5)">?</div>
        <div class="card-slot" id="slot-6" onclick="setSlot(6)">?</div>
    </div>
</div>

<div class="selector-grid" id="val-selector"></div>
<div class="suit-grid">
    <button class="suit-btn" style="color:#fff" onclick="selectSuit('♠')">♠</button>
    <button class="suit-btn" style="color:#f6465d" onclick="selectSuit('♥')">♥</button>
    <button class="suit-btn" style="color:#34aadc" onclick="selectSuit('♦')">♦</button>
    <button class="suit-btn" style="color:#02c076" onclick="selectSuit('♣')">♣</button>
</div>

<div class="footer-btns">
    <button class="btn players" id="p-count" onclick="togglePlayers()">Игроков: 2</button>
    <button class="btn reset" onclick="resetBoard()">СБРОС</button>
</div>

<script>
    let players = 2;
    let currentSlot = 0;
    let hand = Array(7).fill(null);
    const values = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
    let tempValue = null;

    const vSel = document.getElementById('val-selector');
    values.forEach(v => {
        vSel.innerHTML += `<button class="sel-btn" onclick="selectValue('${v}')">${v}</button>`;
    });

    function togglePlayers() {
        players = players >= 8 ? 2 : players + 1;
        document.getElementById('p-count').innerText = `Игроков: ${players}`;
        calculate();
    }

    function setSlot(i) { currentSlot = i; updateUI(); }

    function selectValue(v) { tempValue = v; }

    function selectSuit(s) {
        if(!tempValue) return;
        const newCard = tempValue + s;
        if(hand.includes(newCard)) return; // Защита от дублей
        hand[currentSlot] = newCard;
        tempValue = null;
        if(currentSlot < 6) currentSlot++;
        updateUI();
        calculate();
    }

    function updateUI() {
        hand.forEach((card, i) => {
            const el = document.getElementById('slot-' + i);
            el.innerText = card ? card.replace('T', '10') : '?';
            el.className = 'card-slot' + (i === currentSlot ? ' active' : '') + (card ? ' filled' : '');
            if(card) el.style.color = (card.includes('♥') || card.includes('♦')) ? '#f6465d' : '#1e2329';
        });
    }

    function resetBoard() {
        hand = Array(7).fill(null);
        currentSlot = 0;
        updateUI();
        calculate();
    }

    function calculate() {
        const myCards = hand.slice(0, 2).filter(c => c);
        const board = hand.slice(2).filter(c => c);
        
        if(myCards.length < 2) {
            document.getElementById('win-output').innerText = "0%";
            document.getElementById('hand-output').innerText = "Ожидание карт...";
            return;
        }

        // --- Улучшенная математика (Heuristic Engine) ---
        let score = 0;
        const allCards = [...myCards, ...board];
        const valCounts = {};
        allCards.forEach(c => { const v = c[0]; valCounts[v] = (valCounts[v] || 0) + 1; });
        
        const counts = Object.values(valCounts).sort((a, b) => b - a);
        let handName = "Старшая карта";

        // Логика определения комбинаций
        if (counts[0] === 4) { score = 95; handName = "Каре"; }
        else if (counts[0] === 3 && counts[1] >= 2) { score = 90; handName = "Фулл Хаус"; }
        else if (counts[0] === 3) { score = 75; handName = "Сет (Тройка)"; }
        else if (counts[1] === 2) { score = 65; handName = "Две пары"; }
        else if (counts[0] === 2) { score = 45; handName = "Пара"; }
        else {
            // Если комбинаций нет, смотрим на силу карт
            const highCard = values.indexOf(myCards[0][0]);
            score = (15 - highCard) * 3;
            handName = "Старшая " + myCards[0][0];
        }

        // Коррекция на количество игроков
        let equity = score / (players * 0.6);
        if (board.length === 0) equity = score / (players * 0.8); // Префлоп чуть жестче
        
        const final = Math.min(Math.max(equity, 2), 99.1).toFixed(1);
        document.getElementById('win-output').innerText = final + "%";
        document.getElementById('hand-output').innerText = handName;
    }

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
</script>
</body>
</html>
